kind = "web"
previewPath = "/"
title = "Habbo Radio Raffle"
version = "1.0.0"
id = "artifacts/habbo-radio-raffle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19054
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/habbo-radio-raffle run dev"

[services.env]
PORT = "19054"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/habbo-radio-raffle", "run", "build"]
publicDir = "artifacts/habbo-radio-raffle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
